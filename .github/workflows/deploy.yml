name: Deploy PWA to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build
        run: npm run build -w apps/web
        env:
          # 自动用仓库名作为子路径：/<repo>/
          BASE_PATH: /${{ github.event.repository.name }}/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment2.outputs.page_url || steps.deployment3.outputs.page_url }}
    steps:
      # Pages 发布偶发平台故障，失败自动重试，共 3 次
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: 等待后重试 1
        if: steps.deployment.outcome == 'failure'
        run: sleep 20
      - id: deployment2
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: 等待后重试 2
        if: steps.deployment.outcome == 'failure' && steps.deployment2.outcome == 'failure'
        run: sleep 40
      - id: deployment3
        if: steps.deployment.outcome == 'failure' && steps.deployment2.outcome == 'failure'
        uses: actions/deploy-pages@v4
